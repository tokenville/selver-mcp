<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кладовая</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #FFF8F0;
    --bg-card: #FFFFFF;
    --text: #3D2C1E;
    --text-secondary: #8B7355;
    --shadow: rgba(139, 115, 85, 0.12);
    --border: rgba(139, 115, 85, 0.08);
    --accent: #E8A87C;
    --danger: #D4654A;
    --cat-dairy: #DBEAFE;
    --cat-dairy-active: #93C5FD;
    --cat-meat: #FEE2E2;
    --cat-meat-active: #FCA5A5;
    --cat-bread: #FEF3C7;
    --cat-bread-active: #FCD34D;
    --cat-vegs: #D1FAE5;
    --cat-vegs-active: #6EE7B7;
    --cat-drinks: #E0E7FF;
    --cat-drinks-active: #A5B4FC;
    --cat-snacks: #FCE7F3;
    --cat-snacks-active: #F9A8D4;
    --cat-all: #F3F4F6;
    --cat-all-active: #D1D5DB;
  }

  .dark {
    --bg: #1A1A2E;
    --bg-card: #25253D;
    --text: #E8E0D4;
    --text-secondary: #9B8E7E;
    --shadow: rgba(0, 0, 0, 0.3);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #E8A87C;
    --danger: #E87461;
    --cat-dairy: #1E3A5F;
    --cat-dairy-active: #2563EB;
    --cat-meat: #5F1E1E;
    --cat-meat-active: #DC2626;
    --cat-bread: #5F4B1E;
    --cat-bread-active: #D97706;
    --cat-vegs: #1E5F3A;
    --cat-vegs-active: #059669;
    --cat-drinks: #1E1E5F;
    --cat-drinks-active: #4F46E5;
    --cat-snacks: #5F1E4B;
    --cat-snacks-active: #DB2777;
    --cat-all: #2A2A3E;
    --cat-all-active: #4A4A5E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 12px 16px 0;
    transition: background 0.3s;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #E8A87C, #D4654A);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-input {
    width: 100%;
    height: 38px;
    border: 2px solid var(--border);
    border-radius: 19px;
    padding: 0 14px 0 36px;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232, 168, 124, 0.15);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    opacity: 0.5;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border: none;
    background: var(--border);
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
  }

  .search-clear.visible { display: flex; }

  /* ── Search Results Dropdown ── */
  .search-results {
    position: absolute;
    top: 44px;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-radius: 12px;
    box-shadow: 0 8px 32px var(--shadow);
    border: 1px solid var(--border);
    max-height: 280px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }

  .search-results.visible { display: block; }

  .search-result-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: var(--border); }

  .search-result-emoji { font-size: 22px; flex-shrink: 0; }
  .search-result-name { flex: 1; font-size: 13px; line-height: 1.3; }

  .search-result-add {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }

  .search-result-add:active { transform: scale(0.9); }

  .search-loading, .search-empty {
    padding: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ── Category Tabs ── */
  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 12px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-behavior: smooth;
  }

  .categories::-webkit-scrollbar { display: none; }

  .cat-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cat-tab[data-cat="dairy"]  { background: var(--cat-dairy); color: #1E40AF; }
  .cat-tab[data-cat="meat"]   { background: var(--cat-meat); color: #991B1B; }
  .cat-tab[data-cat="bread"]  { background: var(--cat-bread); color: #92400E; }
  .cat-tab[data-cat="vegs"]   { background: var(--cat-vegs); color: #065F46; }
  .cat-tab[data-cat="drinks"] { background: var(--cat-drinks); color: #3730A3; }
  .cat-tab[data-cat="snacks"] { background: var(--cat-snacks); color: #9D174D; }
  .cat-tab[data-cat="all"]    { background: var(--cat-all); color: var(--text-secondary); }

  .cat-tab.active[data-cat="dairy"]  { background: var(--cat-dairy-active); color: #fff; }
  .cat-tab.active[data-cat="meat"]   { background: var(--cat-meat-active); color: #fff; }
  .cat-tab.active[data-cat="bread"]  { background: var(--cat-bread-active); color: #fff; }
  .cat-tab.active[data-cat="vegs"]   { background: var(--cat-vegs-active); color: #fff; }
  .cat-tab.active[data-cat="drinks"] { background: var(--cat-drinks-active); color: #fff; }
  .cat-tab.active[data-cat="snacks"] { background: var(--cat-snacks-active); color: #fff; }
  .cat-tab.active[data-cat="all"]    { background: var(--cat-all-active); color: var(--text); }

  .cat-tab:active { transform: scale(0.95); }

  .cat-count {
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    padding: 1px 6px;
    min-width: 20px;
    text-align: center;
  }

  .cat-tab.active .cat-count {
    background: rgba(255,255,255,0.3);
    color: #fff;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 12px 100px;
  }

  @media (min-width: 420px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ── Item Card ── */
  .card {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 12px 8px 10px;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: cardIn 0.25s ease-out;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
    opacity: 0.6;
  }

  .card[data-cat="dairy"]::before  { background: var(--cat-dairy-active); }
  .card[data-cat="meat"]::before   { background: var(--cat-meat-active); }
  .card[data-cat="bread"]::before  { background: var(--cat-bread-active); }
  .card[data-cat="vegs"]::before   { background: var(--cat-vegs-active); }
  .card[data-cat="drinks"]::before { background: var(--cat-drinks-active); }
  .card[data-cat="snacks"]::before { background: var(--cat-snacks-active); }
  .card[data-cat="other"]::before  { background: var(--cat-all-active); }

  .card:active { transform: scale(0.97); }

  .card.removing {
    animation: cardOut 0.25s ease-in forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.85) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes cardOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(0.7); }
  }

  .card-emoji {
    font-size: 28px;
    line-height: 1;
    margin-bottom: 2px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
  }

  .card-img {
    width: 56px;
    height: 56px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 6px;
  }

  .search-result-img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .search-result-price {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .search-result-price.sale {
    color: #DC2626;
    font-weight: 600;
  }

  .search-result-price s {
    color: var(--muted);
    font-weight: 400;
  }

  .card-name {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.25;
    max-height: 2.5em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    color: var(--text);
    word-break: break-word;
  }

  .card-qty {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 1px;
  }

  .card-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-qty {
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 50%;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s, background 0.2s;
    color: #fff;
    line-height: 1;
    padding: 0;
  }

  .btn-qty:active { transform: scale(0.85); }

  .btn-minus { background: var(--text-secondary); }
  .btn-plus  { background: var(--accent); }

  .btn-qty.danger { background: var(--danger); }

  .qty-value {
    font-size: 16px;
    font-weight: 800;
    min-width: 16px;
    text-align: center;
    color: var(--text);
  }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    grid-column: 1 / -1;
  }

  .empty-icon {
    font-size: 64px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .empty-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-secondary);
    opacity: 0.7;
    margin-top: 6px;
  }

  /* ── Loading Skeleton ── */
  .skeleton {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 12px 8px 10px;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    border: 1px solid var(--border);
    height: 130px;
    position: relative;
    overflow: hidden;
  }

  .skeleton::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  /* ── Delete confirm overlay ── */
  .delete-confirm {
    position: absolute;
    inset: 0;
    background: rgba(212, 101, 74, 0.92);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    animation: fadeIn 0.15s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .delete-confirm-text {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  .delete-confirm-btns {
    display: flex;
    gap: 8px;
  }

  .delete-confirm-btns button {
    padding: 6px 16px;
    border: none;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.12s;
  }

  .delete-confirm-btns button:active { transform: scale(0.9); }
  .btn-del-yes { background: #fff; color: var(--danger); }
  .btn-del-no  { background: rgba(255,255,255,0.25); color: #fff; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--bg-card);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 20px var(--shadow);
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="title">Кладовая</div>
    <div class="search-wrap">
      <span class="search-icon">&#x1F50D;</span>
      <input class="search-input" type="text" placeholder="Найти в Selver..." autocomplete="off" id="searchInput">
      <button class="search-clear" id="searchClear">&times;</button>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
  <div class="categories" id="categories"></div>
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
// ── Telegram WebApp ──
const tg = window.Telegram && Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

function haptic(type) {
  try { tg && tg.HapticFeedback.impactOccurred(type || 'light'); } catch(e) {}
}

// ── Dark mode ──
function applyTheme() {
  const isDark = tg && tg.colorScheme === 'dark';
  document.body.classList.toggle('dark', isDark);
}
applyTheme();
if (tg) {
  tg.onEvent('themeChanged', applyTheme);
}

// ── Categories ──
const CATEGORIES = [
  { id: 'all',    emoji: '\u{1F4E6}', label: '\u0412\u0441\u0451' },
  { id: 'dairy',  emoji: '\u{1F95B}', label: '\u041C\u043E\u043B\u043E\u0447\u043D\u043E\u0435' },
  { id: 'meat',   emoji: '\u{1F969}', label: '\u041C\u044F\u0441\u043E' },
  { id: 'bread',  emoji: '\u{1F35E}', label: '\u0425\u043B\u0435\u0431' },
  { id: 'vegs',   emoji: '\u{1F96C}', label: '\u041E\u0432\u043E\u0449\u0438' },
  { id: 'drinks', emoji: '\u{1F964}', label: '\u041D\u0430\u043F\u0438\u0442\u043A\u0438' },
  { id: 'snacks', emoji: '\u{1F36A}', label: '\u0421\u043D\u0435\u043A\u0438' },
];

const KEYWORDS = {
  dairy: ['piim','juust','kohupiim','jogurt','kefir','keefir','hapukoor','v\u00F5i','koor','mozzarella','burrata','kodujuust','m\u00E4\u00E4rdejuust','sulatatud juust','riivjuust'],
  meat:  ['liha','vorst','sink','kana','sea','kalapulk','viiner','broiler','hakkliha','toorvorst','salaami','pelmeeni','kintsud','rinnafilee','kintsuliha'],
  bread: ['leib','sai','r\u00F6st','baguett','kuklid','pasta','pagar','vahvel','keeks','kook'],
  vegs:  ['kartul','porgand','sibul','tomat','kurk','kapsas','salat','banaan','avokaado','paprika','lillkapsas','brokoli','spargelkapsas','k\u00FC\u00FCslauk','bakla\u017Eaan','seen','mango','apelsin','peet'],
  drinks:['vesi','mahl','kohv','tee','karastusjook','pepsi','coca','mineraalvesi','jook','morsikas'],
  snacks:['\u0161okolaad','k\u00FCpsis','kr\u00F5ps','p\u00E4hkel','kommid','sn\u00E4kk','popcorn','maisipall','n\u00E4rimiskumm','pistaatsia','mandel','kaneel','oliivi\u00F5li','p\u00E4rm'],
};

const EMOJI_MAP = {
  dairy: '\u{1F95B}', meat: '\u{1F969}', bread: '\u{1F35E}', vegs: '\u{1F96C}', drinks: '\u{1F964}', snacks: '\u{1F36A}', other: '\u{1F4E6}'
};

const ITEM_EMOJIS = {
  piim: '\u{1F95B}', juust: '\u{1F9C0}', kohupiim: '\u{1F95B}', jogurt: '\u{1F95B}', kefir: '\u{1F95B}', keefir: '\u{1F95B}',
  hapukoor: '\u{1F95B}', 'v\u00F5i': '\u{1F9C8}', koor: '\u{1F95B}', mozzarella: '\u{1F9C0}', burrata: '\u{1F9C0}', riivjuust: '\u{1F9C0}',
  'm\u00E4\u00E4rdejuust': '\u{1F9C0}', kodujuust: '\u{1F9C0}', sulatatud: '\u{1F9C0}',
  liha: '\u{1F969}', vorst: '\u{1F32D}', sink: '\u{1F953}', kana: '\u{1F357}', broiler: '\u{1F357}', hakkliha: '\u{1F969}',
  toorvorst: '\u{1F32D}', salaami: '\u{1F953}', pelmeeni: '\u{1F95F}', viiner: '\u{1F32D}',
  leib: '\u{1F35E}', sai: '\u{1F956}', 'r\u00F6st': '\u{1F35E}', pasta: '\u{1F35D}', vahvel: '\u{1F9C7}', keeks: '\u{1F9C1}', kook: '\u{1F382}',
  kartul: '\u{1F954}', porgand: '\u{1F955}', sibul: '\u{1F9C5}', tomat: '\u{1F345}', kurk: '\u{1F952}', kapsas: '\u{1F96C}',
  salat: '\u{1F957}', banaan: '\u{1F34C}', avokaado: '\u{1F951}', paprika: '\u{1FAD1}', 'k\u00FC\u00FCslauk': '\u{1F9C4}',
  'bakla\u017Eaan': '\u{1F346}', seen: '\u{1F344}', mango: '\u{1F96D}', apelsin: '\u{1F34A}', lillkapsas: '\u{1F966}',
  brokoli: '\u{1F966}', spargelkapsas: '\u{1F966}', peet: '\u{1FAD2}',
  vesi: '\u{1F4A7}', mahl: '\u{1F9C3}', kohv: '\u2615', tee: '\u{1F375}', karastusjook: '\u{1F964}', pepsi: '\u{1F964}',
  mineraalvesi: '\u{1F4A7}', jook: '\u{1F9C3}',
  '\u0161okolaad': '\u{1F36B}', 'k\u00FCpsis': '\u{1F36A}', 'kr\u00F5ps': '\u{1F968}', 'p\u00E4hkel': '\u{1F95C}', pistaatsia: '\u{1F95C}',
  mandel: '\u{1F95C}', popcorn: '\u{1F37F}', maisipall: '\u{1F37F}', 'sn\u00E4kk': '\u{1F358}', 'n\u00E4rimiskumm': '\u{1FAE7}',
  kaneel: '\u{1FAD0}', 'oliivi\u00F5li': '\u{1FAD2}', 'p\u00E4rm': '\u{1F9C2}', muna: '\u{1F95A}',
};

function categorize(name) {
  const lower = name.toLowerCase();
  for (const [cat, words] of Object.entries(KEYWORDS)) {
    for (const w of words) {
      if (lower.includes(w)) return cat;
    }
  }
  return 'other';
}

function itemEmoji(name) {
  const lower = name.toLowerCase();
  if (lower.includes('muna')) return '\u{1F95A}';
  for (const [keyword, emoji] of Object.entries(ITEM_EMOJIS)) {
    if (lower.includes(keyword)) return emoji;
  }
  const cat = categorize(name);
  return EMOJI_MAP[cat] || '\u{1F4E6}';
}

function extractQtyUnit(name) {
  const m = name.match(/(\d+[.,]?\d*)\s*(kg|g|l|ml|tk|cl)\b/i);
  if (m) return m[1].replace(',','.') + ' ' + m[2].toLowerCase();
  return null;
}

function shortName(name) {
  let short = name.split(',')[0].trim();
  short = short.replace(/\s+\d+[.,]?\d*\s*(kg|g|l|ml|tk|cl)\s*$/i, '').trim();
  return short || name.split(',')[0].trim();
}

// ── API ──
const API = '';
const tgInitData = window.Telegram?.WebApp?.initData || '';

function apiHeaders(extra) {
  const h = { 'X-Telegram-Init-Data': tgInitData };
  if (extra) Object.assign(h, extra);
  return h;
}

async function loadPantry() {
  const r = await fetch(API + '/api/pantry', { headers: apiHeaders() });
  if (!r.ok) throw new Error('Failed to load');
  return r.json();
}

async function addItem(item) {
  const r = await fetch(API + '/api/pantry', {
    method: 'POST',
    headers: apiHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify(item)
  });
  if (!r.ok) throw new Error('Failed to add');
  return r.json();
}

async function updateItem(index, data) {
  const r = await fetch(API + '/api/pantry/' + index, {
    method: 'PATCH',
    headers: apiHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Failed to update');
  return r.json();
}

async function deleteItem(index) {
  const r = await fetch(API + '/api/pantry/' + index, {
    method: 'DELETE',
    headers: apiHeaders()
  });
  if (!r.ok) throw new Error('Failed to delete');
  return r.json();
}

async function searchProducts(q) {
  const r = await fetch(API + '/api/search?q=' + encodeURIComponent(q), { headers: apiHeaders() });
  if (!r.ok) throw new Error('Search failed');
  return r.json();
}

// ── State ──
let pantry = [];
let activeCat = 'all';
let searchTimeout = null;

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('visible'); }, 2000);
}

// ── Render Categories ──
function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  CATEGORIES.forEach(function(cat) {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (activeCat === cat.id ? ' active' : '');
    btn.dataset.cat = cat.id;

    const count = cat.id === 'all'
      ? pantry.length
      : pantry.filter(function(it) { return categorize(it.name) === cat.id; }).length;

    btn.innerHTML = cat.emoji + ' ' + cat.label + '<span class="cat-count">' + count + '</span>';

    btn.onclick = function() {
      haptic('light');
      activeCat = cat.id;
      renderCategories();
      renderGrid();
    };

    container.appendChild(btn);
  });
}

// ── Render Grid ──
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let items = pantry.map(function(item, index) {
    return Object.assign({}, item, { _index: index });
  });

  if (activeCat !== 'all') {
    items = items.filter(function(it) { return categorize(it.name) === activeCat; });
  }

  if (items.length === 0) {
    const emptyEmoji = activeCat === 'all' ? '\u{1F3E0}' : (EMOJI_MAP[activeCat] || '\u{1F4E6}');
    const emptyText = activeCat === 'all' ? '\u041A\u043B\u0430\u0434\u043E\u0432\u0430\u044F \u043F\u0443\u0441\u0442\u0430' : '\u041D\u0438\u0447\u0435\u0433\u043E \u043D\u0435\u0442';
    const emptySub = activeCat === 'all' ? '\u041D\u0430\u0439\u0434\u0438\u0442\u0435 \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u044B \u0432 \u043F\u043E\u0438\u0441\u043A\u0435 \u0432\u044B\u0448\u0435' : '\u041F\u043E\u043F\u0440\u043E\u0431\u0443\u0439\u0442\u0435 \u0434\u0440\u0443\u0433\u0443\u044E \u043A\u0430\u0442\u0435\u0433\u043E\u0440\u0438\u044E';
    grid.innerHTML = '<div class="empty-state">' +
      '<div class="empty-icon">' + emptyEmoji + '</div>' +
      '<div class="empty-text">' + emptyText + '</div>' +
      '<div class="empty-sub">' + emptySub + '</div>' +
      '</div>';
    return;
  }

  items.forEach(function(item) {
    const cat = categorize(item.name);
    const emoji = itemEmoji(item.name);
    const qty = item.quantity || 1;
    const qtyUnit = extractQtyUnit(item.name);
    const name = shortName(item.name);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = cat;
    card.dataset.index = item._index;

    var imgUrl = item.image ? 'https://www.selver.ee/img/200/200/resize' + item.image : '';
    var visual = imgUrl
      ? '<div class="card-img"><img src="' + imgUrl + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'' + emoji + '\'"></div>'
      : '<div class="card-emoji">' + emoji + '</div>';

    card.innerHTML = visual +
      '<div class="card-name" title="' + item.name.replace(/"/g, '&quot;') + '">' + name + '</div>' +
      (qtyUnit ? '<div class="card-qty">' + qtyUnit + '</div>' : '') +
      '<div class="card-controls">' +
        '<button class="btn-qty btn-minus' + (qty <= 1 ? ' danger' : '') + '" data-action="minus">\u2212</button>' +
        '<span class="qty-value">' + qty + '</span>' +
        '<button class="btn-qty btn-plus" data-action="plus">+</button>' +
      '</div>';

    card.addEventListener('click', function(e) {
      var btn = e.target.closest('.btn-qty');
      if (!btn) return;
      e.stopPropagation();
      var action = btn.dataset.action;
      var idx = item._index;

      if (action === 'plus') {
        haptic('light');
        handlePlus(idx, card);
      } else if (action === 'minus') {
        haptic('light');
        handleMinus(idx, card);
      }
    });

    grid.appendChild(card);
  });
}

// ── +/- Handlers ──
async function handlePlus(index, card) {
  var item = pantry[index];
  var oldQty = item.quantity || 1;
  var newQty = oldQty + 1;

  item.quantity = newQty;
  updateCardQty(card, newQty);

  try {
    await updateItem(index, { quantity: newQty });
  } catch (e) {
    item.quantity = oldQty;
    updateCardQty(card, oldQty);
    showToast('\u041E\u0448\u0438\u0431\u043A\u0430 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u044F');
  }
}

async function handleMinus(index, card) {
  var item = pantry[index];
  var oldQty = item.quantity || 1;

  if (oldQty > 1) {
    var newQty = oldQty - 1;
    item.quantity = newQty;
    updateCardQty(card, newQty);

    try {
      await updateItem(index, { quantity: newQty });
    } catch (e) {
      item.quantity = oldQty;
      updateCardQty(card, oldQty);
      showToast('\u041E\u0448\u0438\u0431\u043A\u0430 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u044F');
    }
  } else {
    showDeleteConfirm(index, card);
  }
}

function updateCardQty(card, qty) {
  var valEl = card.querySelector('.qty-value');
  var minusBtn = card.querySelector('.btn-minus');
  if (valEl) valEl.textContent = qty;
  if (minusBtn) {
    minusBtn.classList.toggle('danger', qty <= 1);
  }
}

function showDeleteConfirm(index, card) {
  var existing = card.querySelector('.delete-confirm');
  if (existing) return;

  haptic('medium');

  var overlay = document.createElement('div');
  overlay.className = 'delete-confirm';
  overlay.innerHTML = '<div class="delete-confirm-text">\u0423\u0434\u0430\u043B\u0438\u0442\u044C?</div>' +
    '<div class="delete-confirm-btns">' +
      '<button class="btn-del-yes">\u0414\u0430</button>' +
      '<button class="btn-del-no">\u041D\u0435\u0442</button>' +
    '</div>';

  overlay.querySelector('.btn-del-yes').onclick = async function(e) {
    e.stopPropagation();
    haptic('medium');
    card.classList.add('removing');

    try {
      await deleteItem(index);
      await refreshPantry();
      showToast('\u0423\u0434\u0430\u043B\u0435\u043D\u043E');
    } catch (err) {
      card.classList.remove('removing');
      overlay.remove();
      showToast('\u041E\u0448\u0438\u0431\u043A\u0430 \u0443\u0434\u0430\u043B\u0435\u043D\u0438\u044F');
    }
  };

  overlay.querySelector('.btn-del-no').onclick = function(e) {
    e.stopPropagation();
    haptic('light');
    overlay.remove();
  };

  card.appendChild(overlay);
}

// ── Search ──
var searchInput = document.getElementById('searchInput');
var searchClear = document.getElementById('searchClear');
var searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function() {
  var q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);

  clearTimeout(searchTimeout);

  if (q.length < 2) {
    searchResults.classList.remove('visible');
    return;
  }

  searchTimeout = setTimeout(function() { doSearch(q); }, 300);
});

searchClear.addEventListener('click', function() {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  searchResults.classList.remove('visible');
  searchInput.focus();
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) {
    searchResults.classList.remove('visible');
  }
});

async function doSearch(q) {
  searchResults.innerHTML = '<div class="search-loading">\u0418\u0449\u0435\u043C...</div>';
  searchResults.classList.add('visible');

  try {
    var results = await searchProducts(q);
    var items = results.items || results;

    if (!items || items.length === 0) {
      searchResults.innerHTML = '<div class="search-empty">\u041D\u0438\u0447\u0435\u0433\u043E \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u043E</div>';
      return;
    }

    searchResults.innerHTML = '';
    var list = Array.isArray(items) ? items.slice(0, 12) : [];

    list.forEach(function(product) {
      var name = product.name || product;
      var emoji = itemEmoji(name);
      var price = product.price ? product.price.toFixed(2) + '\u20AC' : '';
      var specialPrice = product.special_price ? product.special_price.toFixed(2) + '\u20AC' : '';
      var imgSrc = product.image ? 'https://www.selver.ee/img/100/100/resize' + product.image : '';
      var div = document.createElement('div');
      div.className = 'search-result-item';

      var visualHtml = imgSrc
        ? '<img class="search-result-img" src="' + imgSrc + '" alt="" onerror="this.outerHTML=\'<span class=search-result-emoji>' + emoji + '</span>\'">'
        : '<span class="search-result-emoji">' + emoji + '</span>';

      var priceHtml = '';
      if (specialPrice) {
        priceHtml = '<span class="search-result-price sale">' + specialPrice + ' <s>' + price + '</s></span>';
      } else if (price) {
        priceHtml = '<span class="search-result-price">' + price + '</span>';
      }

      div.innerHTML = visualHtml +
        '<span class="search-result-name">' + name + priceHtml + '</span>' +
        '<button class="search-result-add">+</button>';

      div.querySelector('.search-result-add').onclick = async function(e) {
        e.stopPropagation();
        haptic('medium');

        var btn = e.target;
        btn.textContent = '\u2713';
        btn.style.background = '#059669';

        try {
          await addItem({ name: name, image: product.image || null });
          await refreshPantry();
          showToast('\u0414\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u043E!');
        } catch (err) {
          btn.textContent = '!';
          btn.style.background = 'var(--danger)';
          showToast('\u041E\u0448\u0438\u0431\u043A\u0430');
        }

        setTimeout(function() {
          btn.textContent = '+';
          btn.style.background = '';
        }, 1500);
      };

      searchResults.appendChild(div);
    });
  } catch (e) {
    searchResults.innerHTML = '<div class="search-empty">\u041E\u0448\u0438\u0431\u043A\u0430 \u043F\u043E\u0438\u0441\u043A\u0430</div>';
  }
}

// ── Load & Refresh ──
function showSkeletons() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (var i = 0; i < 9; i++) {
    var sk = document.createElement('div');
    sk.className = 'skeleton';
    grid.appendChild(sk);
  }
}

async function refreshPantry() {
  try {
    pantry = await loadPantry();
    renderCategories();
    renderGrid();
  } catch (e) {
    showToast('\u041E\u0448\u0438\u0431\u043A\u0430 \u0437\u0430\u0433\u0440\u0443\u0437\u043A\u0438');
  }
}

// ── Init ──
showSkeletons();
refreshPantry();
</script>
